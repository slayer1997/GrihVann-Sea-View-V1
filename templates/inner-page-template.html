<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- {{TITLE}} <= 60 chars, {{META}} <= 155 chars -->
<title>{{TITLE}}</title>
<meta name="description" content="{{META}}">
<link rel="canonical" href="https://sea-views.com/{{CANONICAL_PATH}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- {{PREFIX}} = relative path to site root: "../" for /page/, "../../" for /projects/slug/ -->
<link rel="stylesheet" href="{{PREFIX}}assets/site.css">
<script src="{{PREFIX}}assets/site.js" defer></script>
<!-- JSON-LD SLOT: BreadcrumbList + (RealEstateListing|WebPage) + FAQPage go here -->
{{JSONLD}}
</head>
<body>

<!-- header partial (no hero animation on inner pages) -->
{{HEADER}}

<!-- static image hero -->
<header class="hero">
  <img src="{{HERO_IMG}}" alt="{{HERO_ALT}}" fetchpriority="high" width="2200" height="1228">
  <div class="hero-shade"></div>
  <div class="hero-copy">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{H1}}</h1>
    <div class="sub">{{SUBHEAD}}</div>
  </div>
</header>

<!-- breadcrumb trail -->
<nav class="crumb" aria-label="Breadcrumb">{{BREADCRUMB}}</nav>

<!-- main content -->
<main class="prose pad wrap">
  {{CONTENT}}
</main>

<!-- FAQ block -->
<section class="faq pad">
  <div class="wrap">
    <div class="eyebrow" style="margin-bottom:26px;">Questions</div>
    {{FAQ_ITEMS}}
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>{{CTA_H2}}</h2>
  <p class="sub">{{CTA_SUB}}</p>
  <div class="cta-actions">
    <a class="btn btn-solid" href="#" data-enquire>Request details →</a>
    <!-- TODO: Smit verify — real WhatsApp business number -->
    <a class="btn btn-wa" href="https://wa.me/912200000000" rel="nofollow">WhatsApp us</a>
  </div>
</section>

<!-- footer partial -->
{{FOOTER}}


<!-- ============ ENQUIRE MODAL (shared component - keep in sync across all templates/pages) ============ -->
<div class="enquire-overlay" id="enquireOverlay" hidden>
  <div class="enquire-modal" role="dialog" aria-modal="true" aria-labelledby="enquireModalTitle">
    <button type="button" class="enquire-close" aria-label="Close">&times;</button>
    <p class="enquire-eyebrow">Private Viewings &middot; By appointment</p>
    <h3 id="enquireModalTitle">Book a private viewing</h3>
    <form class="enquire-form" id="enquiryModalForm" novalidate>
      <div class="ef-field"><label for="ef-name">Name</label><input id="ef-name" name="name" required autocomplete="name"></div>
      <div class="ef-field"><label for="ef-email">Email</label><input id="ef-email" name="email" type="email" required autocomplete="email"></div>
      <div class="ef-field"><label for="ef-phone">Phone</label><input id="ef-phone" name="phone" type="tel" autocomplete="tel"></div>
      <div class="ef-field"><label for="ef-msg">Which residence calls to you?</label><textarea id="ef-msg" name="message"></textarea></div>
      <button class="ef-submit" type="submit">Arrange my viewing</button>
      <p class="ef-alt">Prefer WhatsApp? <a href="https://wa.me/919289840824?text=Hi%20GrihVann%2C%20I%27d%20like%20to%20enquire." rel="nofollow">Message us directly &rarr;</a></p>
    </form>
  </div>
</div>
<style>
.enquire-overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(29,43,51,.55);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s ease}
.enquire-overlay.is-open{opacity:1;pointer-events:auto}
.enquire-modal{position:relative;background:var(--paper,#FBF9F4);color:var(--ink,#1D2B33);max-width:440px;width:100%;max-height:90vh;overflow-y:auto;padding:clamp(28px,5vw,40px);border-radius:2px;box-shadow:0 30px 80px rgba(0,0,0,.35);transform:translateY(16px);transition:transform .25s ease}
.enquire-overlay.is-open .enquire-modal{transform:translateY(0)}
.enquire-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:26px;line-height:1;color:var(--muted,#5B6A72);cursor:pointer}
.enquire-close:hover{color:var(--ink,#1D2B33)}
.enquire-eyebrow{font-family:var(--monof,monospace);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass,var(--gold,#9A7B3F));margin-bottom:8px}
.enquire-modal h3{font-family:var(--display,var(--font-serif,serif));font-weight:500;font-size:clamp(22px,3vw,28px);margin-bottom:20px;line-height:1.15}
.ef-field{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.ef-field label{font-family:var(--sans,var(--font-sans,sans-serif));font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted,#5B6A72)}
.ef-field input,.ef-field textarea{font-family:var(--sans,var(--font-sans,sans-serif));font-size:15px;padding:10px 12px;border:1px solid var(--line,rgba(0,0,0,.12));border-radius:2px;background:#fff;color:var(--ink,#1D2B33)}
.ef-field textarea{min-height:70px;resize:vertical}
.ef-submit{width:100%;margin-top:6px;padding:14px;border:none;border-radius:2px;background:var(--brass,var(--gold,#9A7B3F));color:#fff;font-family:var(--sans,var(--font-sans,sans-serif));font-size:13px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.ef-submit:hover{background:var(--brass-deep,var(--gold-deep,#7C6132))}
.ef-alt{margin-top:14px;text-align:center;font-family:var(--sans,var(--font-sans,sans-serif));font-size:13px;color:var(--muted,#5B6A72)}
.ef-alt a{color:var(--brass,var(--gold,#9A7B3F))}
</style>
<script>
(function(){
  var overlay=document.getElementById('enquireOverlay');
  if(!overlay) return;
  var modal=overlay.querySelector('.enquire-modal');
  var lastFocus=null;
  function openModal(e){
    if(e) e.preventDefault();
    lastFocus=document.activeElement;
    overlay.hidden=false;
    requestAnimationFrame(function(){ overlay.classList.add('is-open'); });
    document.body.style.overflow='hidden';
    var first=modal.querySelector('input,textarea');
    if(first) first.focus();
  }
  function closeModal(){
    overlay.classList.remove('is-open');
    document.body.style.overflow='';
    setTimeout(function(){ overlay.hidden=true; },250);
    if(lastFocus && lastFocus.focus) lastFocus.focus();
  }
  document.querySelectorAll('[data-enquire]').forEach(function(el){
    el.addEventListener('click',openModal);
  });
  overlay.addEventListener('click',function(e){ if(e.target===overlay) closeModal(); });
  overlay.querySelector('.enquire-close').addEventListener('click',closeModal);
  document.addEventListener('keydown',function(e){ if(e.key==='Escape' && overlay.classList.contains('is-open')) closeModal(); });

  var gclid=new URLSearchParams(location.search).get('gclid');
  if(gclid) sessionStorage.setItem('gclid',gclid);
  var form=document.getElementById('enquiryModalForm');
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var btn=form.querySelector('button');
    btn.disabled=true; btn.textContent='Sending…';
    var data=new FormData(form);
    data.set('gclid',sessionStorage.getItem('gclid')||'');
    data.set('page',location.href);
    fetch('https://script.google.com/macros/s/AKfycbw8Xae1-8TaUREihkODfrz8dYb1JE3zvXNT0Yf-Wb-zBvZgbVyuwVucH0X30uKrsTu7/exec',{method:'POST',mode:'no-cors',body:data});
    form.innerHTML='<p style="text-align:center;font-family:var(--display,var(--font-serif,serif));font-size:1.3rem">Thank you — we will be in touch within one business day.</p>';
  });
})();
</script>
</body>
</html>
